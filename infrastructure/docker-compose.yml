services:
  expense-service:
    build:
      context: ../services/expense-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_OPEN_IN_VIEW: ${SPRING_JPA_OPEN_IN_VIEW}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_LOCATIONS: ${SPRING_FLYWAY_LOCATIONS}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE}
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
      - localstack

  ocr-service:
    build:
      context: ../services/ocr-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: 8082
      SPRING_APPLICATION_NAME: ocr-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spendsmart_ocr
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      AWS_REGION: ap-south-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_S3_BUCKET_NAME: spendsmart-receipts
      AWS_SQS_QUEUE_URL: http://localstack:4566/000000000000/ocr-queue
      AWS_SNS_RECEIPT_EVENTS_TOPIC_ARN: arn:aws:sns:ap-south-1:000000000000:receipt-events
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      GOOGLE_DOCUMENT_AI_PROJECT_ID: ${GOOGLE_DOCUMENT_AI_PROJECT_ID}
      GOOGLE_DOCUMENT_AI_LOCATION: ${GOOGLE_DOCUMENT_AI_LOCATION:-us}
      GOOGLE_DOCUMENT_AI_PROCESSOR_ID: ${GOOGLE_DOCUMENT_AI_PROCESSOR_ID}
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - redis
      - localstack

  categorization-service:
    build:
      context: ../services/categorization-service
      dockerfile: Dockerfile
    environment:
      SQS_QUEUE_URL: http://localstack:4566/000000000000/expense-created
      SQS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      EXPENSE_SERVICE_URL: http://expense-service:8081
    ports:
      - "8083:8083"
    depends_on:
      - expense-service
      - localstack

  upi-service:
    build:
      context: ../services/upi-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8084
      SPRING_APPLICATION_NAME: upi-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: spendsmart_expense
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AWS_REGION: ap-south-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_SQS_QUEUE_URL: http://localstack:4566/000000000000/upi-events
      WEBHOOK_SIGNATURE_SECRET: upi-test-secret
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - redis
      - localstack
      - expense-service
      - categorization-service

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spendsmart_expense
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: spendsmart-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs,sns,secretsmanager
      DEFAULT_REGION: ap-south-1
      AWS_DEFAULT_REGION: ap-south-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  localstack_data:
  elasticsearch_data:
