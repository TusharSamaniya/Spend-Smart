services:
  expense-service:
    build:
      context: ../services/expense-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_OPEN_IN_VIEW: ${SPRING_JPA_OPEN_IN_VIEW}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_LOCATIONS: ${SPRING_FLYWAY_LOCATIONS}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE}
    depends_on:
      - postgres
      - redis
      - localstack

  ocr-service:
    build:
      context: ../services/ocr-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: 8082
      SPRING_APPLICATION_NAME: ocr-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spendsmart_ocr
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      AWS_REGION: ap-south-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_S3_BUCKET_NAME: spendsmart-receipts
      AWS_SQS_QUEUE_URL: http://localstack:4566/000000000000/ocr-queue
      AWS_SNS_RECEIPT_EVENTS_TOPIC_ARN: arn:aws:sns:ap-south-1:000000000000:receipt-events
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      GOOGLE_DOCUMENT_AI_PROJECT_ID: ${GOOGLE_DOCUMENT_AI_PROJECT_ID}
      GOOGLE_DOCUMENT_AI_LOCATION: ${GOOGLE_DOCUMENT_AI_LOCATION:-us}
      GOOGLE_DOCUMENT_AI_PROCESSOR_ID: ${GOOGLE_DOCUMENT_AI_PROCESSOR_ID}
    depends_on:
      - postgres
      - redis
      - localstack

  categorization-service:
    build:
      context: ../services/categorization-service
      dockerfile: Dockerfile
    environment:
      SQS_QUEUE_URL: http://localstack:4566/000000000000/expense-created
      SQS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      EXPENSE_SERVICE_URL: http://expense-service:8081
    depends_on:
      - expense-service
      - localstack

  upi-service:
    build:
      context: ../services/upi-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8084
      SPRING_APPLICATION_NAME: upi-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: spendsmart_expense
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AWS_REGION: ap-south-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_SQS_QUEUE_URL: http://localstack:4566/000000000000/upi-events
      WEBHOOK_SIGNATURE_SECRET: upi-test-secret
    depends_on:
      - postgres
      - redis
      - localstack
      - expense-service
      - categorization-service

  gst-service:
    build:
      context: ../services/gst-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8085
      SPRING_APPLICATION_NAME: gst-service
      GST_DB_URL: jdbc:postgresql://postgres:5432/spendsmart_gst
      GST_DB_USERNAME: postgres
      GST_DB_PASSWORD: postgres
      GST_REDIS_HOST: redis
      GST_REDIS_PORT: 6379
      GST_PORTAL_API_URL: http://mock-gst-portal:9090/commonapi
      GST_PORTAL_API_KEY: test-api-key
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
    depends_on:
      - postgres
      - redis

  workflow-service:
    build:
      context: ../services/workflow-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8086
      SPRING_APPLICATION_NAME: workflow-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/spendsmart_workflow
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spendsmart_workflow
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: spendsmart_workflow
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ap-south-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_SQS_EXPENSE_SUBMITTED_QUEUE_URL: http://localstack:4566/000000000000/expense-events
      AWS_SQS_QUEUE_URL: http://localstack:4566/000000000000/expense-events
      EXPENSE_SERVICE_URL: http://expense-service:8081
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    depends_on:
      - expense-service
      - localstack
      - postgres

  analytics-service:
    build:
      context: ../services/analytics-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8087
      SPRING_APPLICATION_NAME: analytics-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/spendsmart_expense
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spendsmart_expense
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: spendsmart_expense
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AWS_REGION: ap-south-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_SNS_EXPENSE_EVENTS_TOPIC_ARN: arn:aws:sns:ap-south-1:000000000000:expense-events
      AWS_SNS_ANOMALY_ALERT_TOPIC_ARN: arn:aws:sns:ap-south-1:000000000000:anomaly-alerts
    depends_on:
      - expense-service
      - postgres
      - redis
      - localstack

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8088
      SPRING_APPLICATION_NAME: notification-service
      SMTP_PASS: ${SMTP_PASS}
      NOTIFICATION_FROM_EMAIL: ${NOTIFICATION_FROM_EMAIL}
      DASHBOARD_BASE_URL: ${DASHBOARD_BASE_URL:-http://localhost:3000}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH}
      AWS_SQS_NOTIFICATIONS_QUEUE_URL: ${AWS_SQS_NOTIFICATIONS_QUEUE_URL}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    depends_on:
      - localstack
      - expense-service

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_APPLICATION_NAME: api-gateway
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EXPENSE_SERVICE_URL: http://expense-service:8081
      OCR_SERVICE_URL: http://ocr-service:8082
      CATEGORIZATION_SERVICE_URL: http://categorization-service:8083
      UPI_SERVICE_URL: http://upi-service:8084
      GST_SERVICE_URL: http://gst-service:8085
      WORKFLOW_SERVICE_URL: http://workflow-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-service:8087
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    ports:
      - "8080:8080"
    depends_on:
      - expense-service
      - ocr-service
      - categorization-service
      - upi-service
      - gst-service
      - workflow-service
      - analytics-service
      - notification-service
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spendsmart_expense
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: spendsmart-redis
    image: redis:7-alpine

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs,sns,secretsmanager
      DEFAULT_REGION: ap-south-1
      AWS_DEFAULT_REGION: ap-south-1
    volumes:
      - localstack_data:/var/lib/localstack

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  localstack_data:
  elasticsearch_data:
