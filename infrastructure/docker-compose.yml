services:
  expense-service:
    build:
      context: ../services/expense-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_OPEN_IN_VIEW: ${SPRING_JPA_OPEN_IN_VIEW}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_LOCATIONS: ${SPRING_FLYWAY_LOCATIONS}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      AWS_REGION: ${AWS_REGION}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  ocr-service:
    build:
      context: ../services/ocr-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: 8082
      SPRING_APPLICATION_NAME: ocr-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spendsmart_ocr
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_OCR}
      AWS_SNS_RECEIPT_EVENTS_TOPIC_ARN: ${AWS_SNS_RECEIPT_EVENTS_TOPIC_ARN}
      GOOGLE_DOCUMENT_AI_PROJECT_ID: ${GOOGLE_DOCUMENT_AI_PROJECT_ID}
      GOOGLE_DOCUMENT_AI_LOCATION: ${GOOGLE_DOCUMENT_AI_LOCATION:-us}
      GOOGLE_DOCUMENT_AI_PROCESSOR_ID: ${GOOGLE_DOCUMENT_AI_PROCESSOR_ID}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  categorization-service:
    build:
      context: ../services/categorization-service
      dockerfile: Dockerfile
    environment:
      SQS_QUEUE_URL: ${AWS_SQS_QUEUE_CATEGORIZATION}
      AWS_REGION: ${AWS_REGION}
      EXPENSE_SERVICE_URL: http://expense-service:8081
    ports:
      - "8083:8083"
    depends_on:
      expense-service:
        condition: service_started

  upi-service:
    build:
      context: ../services/upi-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8084
      SPRING_APPLICATION_NAME: upi-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: spendsmart_expense
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AWS_REGION: ${AWS_REGION}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_UPI}
      WEBHOOK_SIGNATURE_SECRET: upi-test-secret
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      expense-service:
        condition: service_started
      categorization-service:
        condition: service_started

  gst-service:
    build:
      context: ../services/gst-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8085
      SPRING_APPLICATION_NAME: gst-service
      GST_DB_URL: jdbc:postgresql://postgres:5432/spendsmart_gst
      GST_DB_USERNAME: postgres
      GST_DB_PASSWORD: postgres
      GST_REDIS_HOST: redis
      GST_REDIS_PORT: 6379
      GST_PORTAL_API_URL: http://mock-gst-portal:9090/commonapi
      GST_PORTAL_API_KEY: test-api-key
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  workflow-service:
    build:
      context: ../services/workflow-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8086
      SPRING_APPLICATION_NAME: workflow-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/spendsmart_workflow
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spendsmart_workflow
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: spendsmart_workflow
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_SQS_EXPENSE_SUBMITTED_QUEUE_URL: ${AWS_SQS_QUEUE_EXPENSE_SUBMITTED}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_EXPENSE_EVENTS}
      EXPENSE_SERVICE_URL: http://expense-service:8081
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    ports:
      - "8086:8086"
    depends_on:
      expense-service:
        condition: service_started
      postgres:
        condition: service_started

  analytics-service:
    build:
      context: ../services/analytics-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8087
      SPRING_APPLICATION_NAME: analytics-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/spendsmart_expense
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spendsmart_expense
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: spendsmart_expense
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AWS_REGION: ${AWS_REGION}
      AWS_SNS_EXPENSE_EVENTS_TOPIC_ARN: ${AWS_SNS_EXPENSE_EVENTS_TOPIC_ARN}
      AWS_SNS_ANOMALY_ALERT_TOPIC_ARN: ${AWS_SNS_ANOMALY_ALERT_TOPIC_ARN}
    ports:
      - "8087:8087"
    depends_on:
      expense-service:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8088
      SPRING_APPLICATION_NAME: notification-service
      SMTP_PASS: ${SMTP_PASS:-}
      NOTIFICATION_FROM_EMAIL: ${NOTIFICATION_FROM_EMAIL:-noreply@spendsmart.in}
      DASHBOARD_BASE_URL: ${DASHBOARD_BASE_URL:-http://localhost:3000}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      AWS_SQS_NOTIFICATIONS_QUEUE_URL: ${AWS_SQS_QUEUE_NOTIFICATIONS}
      AWS_REGION: ${AWS_REGION}
    ports:
      - "8088:8088"
    depends_on:
      expense-service:
        condition: service_started

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_APPLICATION_NAME: api-gateway
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EXPENSE_SERVICE_URL: http://expense-service:8081
      OCR_SERVICE_URL: http://ocr-service:8082
      CATEGORIZATION_SERVICE_URL: http://categorization-service:8083
      UPI_SERVICE_URL: http://upi-service:8084
      GST_SERVICE_URL: http://gst-service:8085
      WORKFLOW_SERVICE_URL: http://workflow-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-service:8087
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    ports:
      - "8080:8080"
    depends_on:
      expense-service:
        condition: service_started
      ocr-service:
        condition: service_started
      categorization-service:
        condition: service_started
      upi-service:
        condition: service_started
      gst-service:
        condition: service_started
      workflow-service:
        condition: service_started
      analytics-service:
        condition: service_started
      notification-service:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spendsmart_expense
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
      - ./scripts/analytics_views.sql:/docker-entrypoint-initdb.d/02-analytics-views.sql:ro

  redis:
    container_name: spendsmart-redis
    image: redis:7-alpine

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  elasticsearch_data: