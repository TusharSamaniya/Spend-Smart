server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: analytics-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spendsmart_expense}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

aws:
  region: ${AWS_REGION:ap-south-1}
  endpoint-url: ${AWS_ENDPOINT_URL:http://localhost:4566}
  sns:
    expense-events-topic-arn: ${AWS_SNS_EXPENSE_EVENTS_TOPIC_ARN:arn:aws:sns:ap-south-1:000000000000:expense-events}
    anomaly-alert-topic-arn: ${AWS_SNS_ANOMALY_ALERT_TOPIC_ARN:arn:aws:sns:ap-south-1:000000000000:anomaly-alerts}

analytics:
  anomaly-threshold: 1.20
  baseline-days: 90
