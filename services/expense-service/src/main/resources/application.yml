server:
  port: 8083

spring:
  application:
    name: expense-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:spendsmart_expense}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: myverylonglocalsecretsigninkeyforjwt12345678
  expiration: 86400000

aws:
  region: ap-south-1
  endpoint-url: ${AWS_ENDPOINT_URL:http://localhost:4566}
  sqs:
    queue-url: ${AWS_SQS_QUEUE_URL:http://localhost:4566/000000000000/expense-events}

management:
  endpoints:
    web:
      exposure:
        include: health,info