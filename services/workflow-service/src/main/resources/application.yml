server:
  port: 8086

spring:
  application:
    name: workflow-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:spendsmart_workflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-south-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:test}
        secret-key: ${AWS_SECRET_ACCESS_KEY:test}
      sqs:
        endpoint: ${AWS_ENDPOINT_URL:http://localhost:4566}

aws:
  region: ${AWS_REGION:ap-south-1}
  endpoint-url: ${AWS_ENDPOINT_URL:http://localhost:4566}
  sqs:
    expense-submitted-queue-url: ${AWS_SQS_EXPENSE_SUBMITTED_QUEUE_URL:http://localhost:4566/000000000000/expense-submitted}

workflow:
  default-escalation-hours: 48
  auto-approve-below: 0

expense:
  service:
    url: http://expense-service:8081

notification:
  service:
    url: http://notification-service:8088
