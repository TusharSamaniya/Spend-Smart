server:
  port: 8084

spring:
  application:
    name: upi-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:spendsmart_expense}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

aws:
  region: ap-south-1
  endpoint-url: ${AWS_ENDPOINT_URL:http://localhost:4566}

upi:
  auto-approve-threshold: 500
