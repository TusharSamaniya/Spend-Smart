server:
  port: 8084

spring:
  application:
    name: upi-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:spendsmart_expense}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_upi
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    aws:
      credentials:
        access-key: test
        secret-key: test
      region:
        static: ap-south-1
      sqs:
        endpoint: ${AWS_ENDPOINT_URL:http://localhost:4566}

aws:
  region: ap-south-1
  endpoint-url: ${AWS_ENDPOINT_URL:http://localhost:4566}
  sqs:
    queue-url: ${AWS_SQS_QUEUE_URL:http://localhost:4566/000000000000/upi-events}

webhook:
  signature-secret: ${WEBHOOK_SIGNATURE_SECRET:change-me}

upi:
  auto-approve-threshold: 500
