<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Expense Rejection Notice</title>
</head>
<body style="margin:0;background:#f3f6fb;font-family:Arial,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="background:#0f172a;padding:16px 24px;color:#ffffff;font-size:20px;font-weight:700;">SpendSmart</td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <h2 style="margin:0 0 12px 0;">Expense Rejected</h2>
              <p style="margin:0 0 12px 0;">Hello {employeeName},</p>
              <p style="margin:0 0 16px 0;">Your expense claim for <strong>{amount}</strong> was not approved.</p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #fecaca;background:#fef2f2;border-radius:8px;">
                <tr>
                  <td style="padding:14px 16px;">
                    <p style="margin:0;font-weight:700;color:#b91c1c;">Reason</p>
                    <p style="margin:6px 0 0 0;color:#7f1d1d;">{reason}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
