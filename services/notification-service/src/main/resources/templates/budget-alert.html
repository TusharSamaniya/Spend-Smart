<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Budget Alert</title>
</head>
<body style="margin:0;background:#f3f6fb;font-family:Arial,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="background:#0f172a;padding:16px 24px;color:#ffffff;font-size:20px;font-weight:700;">SpendSmart</td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <h2 style="margin:0 0 10px 0;">Budget Utilization Alert</h2>
              <p style="margin:0 0 6px 0;">Hello {managerName},</p>
              <p style="margin:0 0 14px 0;">Budget <strong>{budgetName}</strong> is at <strong>{pctUsed}</strong> utilization.</p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
                <tr>
                  <td style="background:#16a34a;height:16px;width:{progressUsedWidth};"></td>
                  <td style="background:#e5e7eb;height:16px;width:{progressRemainingWidth};"></td>
                </tr>
              </table>
              <p style="margin:12px 0 0 0;">Alert level: <strong>{alertLevel}</strong></p>
              <p style="margin:8px 0 0 0;font-size:12px;color:#6b7280;">Thresholds: warning 75%, urgent 90%, critical 100%.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
