<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Expense Approval Request</title>
</head>
<body style="margin:0;background:#f3f6fb;font-family:Arial,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="background:#0f172a;padding:16px 24px;color:#ffffff;font-size:20px;font-weight:700;">SpendSmart</td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 12px 0;">Hello {approverName},</p>
              <p style="margin:0 0 16px 0;">{employeeName} submitted an expense requiring your approval.</p>
              <table role="presentation" width="100%" cellpadding="8" cellspacing="0" style="border-collapse:collapse;border:1px solid #e5e7eb;">
                <tr>
                  <td style="width:180px;background:#f9fafb;font-weight:600;border-bottom:1px solid #e5e7eb;">Employee</td>
                  <td style="border-bottom:1px solid #e5e7eb;">{employeeName}</td>
                </tr>
                <tr>
                  <td style="background:#f9fafb;font-weight:600;border-bottom:1px solid #e5e7eb;">Amount</td>
                  <td style="border-bottom:1px solid #e5e7eb;">{amount}</td>
                </tr>
                <tr>
                  <td style="background:#f9fafb;font-weight:600;border-bottom:1px solid #e5e7eb;">Merchant</td>
                  <td style="border-bottom:1px solid #e5e7eb;">{merchantName}</td>
                </tr>
                <tr>
                  <td style="background:#f9fafb;font-weight:600;">Task ID</td>
                  <td>{taskId}</td>
                </tr>
              </table>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin-top:22px;">
                <tr>
                  <td>
                    <a href="{approveUrl}" style="display:inline-block;background:#0f9d58;color:#ffffff;text-decoration:none;padding:10px 16px;border-radius:8px;font-weight:600;">Approve</a>
                  </td>
                  <td style="width:10px;"></td>
                  <td>
                    <a href="{rejectUrl}" style="display:inline-block;background:#d93025;color:#ffffff;text-decoration:none;padding:10px 16px;border-radius:8px;font-weight:600;">Reject</a>
                  </td>
                </tr>
              </table>
              <p style="margin:18px 0 0 0;font-size:12px;color:#6b7280;">If buttons do not work, open this approval link: <a href="{approveUrl}">{approveUrl}</a></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
