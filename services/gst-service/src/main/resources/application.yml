server:
  port: 8085

spring:
  application:
    name: gst-service
  datasource:
    url: ${GST_DB_URL:jdbc:postgresql://localhost:5432/spendsmart_gst}
    username: ${GST_DB_USERNAME:postgres}
    password: ${GST_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration
  data:
    redis:
      host: ${GST_REDIS_HOST:localhost}
      port: ${GST_REDIS_PORT:6379}

gst:
  portal:
    api-url: ${GST_PORTAL_API_URL:http://localhost:9090/mock-gst-api}
    api-key: ${GST_PORTAL_API_KEY:}

---
spring:
  config:
    activate:
      on-profile: prod

gst:
  portal:
    api-url: https://api.gst.gov.in/commonapi
